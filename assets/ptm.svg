<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: rounded rectangle representing a sidebar panel -->
  <rect x="8" y="4" width="48" height="56" rx="6" ry="6" fill="#3d3846"/>
  <rect x="8" y="4" width="48" height="56" rx="6" ry="6" fill="none" stroke="#9a9996" stroke-width="1.5"/>

  <!-- Active tab row (highlighted with blue left border) -->
  <rect x="8" y="14" width="4" height="12" rx="0" fill="#3584e4"/>
  <rect x="14" y="16" width="36" height="8" rx="3" fill="#4a4458"/>

  <!-- Tab row 2 -->
  <rect x="14" y="30" width="36" height="8" rx="3" fill="#4a4458"/>

  <!-- Tab row 3 -->
  <rect x="14" y="44" width="28" height="8" rx="3" fill="#4a4458"/>

  <!-- Text lines inside tab rows -->
  <rect x="18" y="19" width="18" height="2" rx="1" fill="#c0bfbc"/>
  <rect x="18" y="33" width="24" height="2" rx="1" fill="#c0bfbc"/>
  <rect x="18" y="47" width="14" height="2" rx="1" fill="#c0bfbc"/>
</svg>
